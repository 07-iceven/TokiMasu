<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="你访问的页面不存在。返回时格 · TokiMasu，继续用最真实的动作感知时间的流逝。"
    />
    <title>404 · 时格 · TokiMasu</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0f0f2;
        --paper: rgba(250, 250, 250, 0.96);
        --line: #171717;
        --border: #e5e5e5;
        --text: #171717;
        --muted: #666666;
        --soft: #888888;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        padding: 24px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.45)),
          var(--bg);
        color: var(--text);
        font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .paper {
        width: min(920px, 100%);
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 16px 48px rgba(23, 23, 23, 0.06);
        overflow: hidden;
      }

      .layout {
        display: block;
      }

      .content {
        max-width: 720px;
        padding: 56px 48px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .brand img {
        width: 36px;
        height: 36px;
      }

      .brand-text {
        line-height: 1.15;
      }

      .brand-text strong {
        display: block;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .brand-text span {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        color: var(--soft);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .code {
        display: block;
        margin: 0 0 14px;
        font-family: "Noto Serif SC", Georgia, "Times New Roman", serif;
        font-size: clamp(72px, 16vw, 128px);
        font-weight: 700;
        line-height: 0.96;
        letter-spacing: -0.035em;
        color: var(--line);
        text-shadow: 0 1px 0 rgba(23, 23, 23, 0.05);
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(32px, 7vw, 52px);
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .lead {
        max-width: 34em;
        margin: 0;
        font-size: 15px;
        line-height: 1.8;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 18px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .button.primary {
        background: var(--line);
        color: #ffffff;
      }

      .button.secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }

      .button:hover {
        background: #2b2b2b;
        border-color: #2b2b2b;
        color: #ffffff;
      }

      .button.secondary:hover {
        background: #f5f5f5;
        border-color: #d6d6d6;
        color: var(--text);
      }

      .meta {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--soft);
        line-height: 1.8;
      }

      @media (max-width: 760px) {
        body {
          padding: 16px;
        }

        .content {
          padding: 32px 24px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="paper">
      <section class="layout">
        <div class="content">
          <div class="brand">
            <img src="/Logo.svg" alt="时格 · TokiMasu" />
            <div class="brand-text">
              <strong>时格 · TokiMasu</strong>
              <span>笔落一格，度过一日。</span>
            </div>
          </div>

          <span class="code" aria-label="404 页面">404</span>
          <h1>这一格，暂时找不到。</h1>
          <p class="lead">
            你访问的页面不存在，或已经被移动。回到首页，重新设定日期，打印网格，每天用笔涂黑一格，用最真实的动作感知时间的流逝。
          </p>

          <div class="actions">
            <a class="button primary" href="/">返回首页</a>
            <a class="button secondary" href="javascript:history.back()">返回上一页</a>
          </div>

          <div class="meta">
            页面不存在并不意味着时间停下。
          </div>
        </div>

      </section>
    </main>
  </body>
</html>
